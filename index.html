<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>British Museum | Final HD Wayfinder</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        :root { --bm-red: #c0392b; --bm-gold: #d4af37; --glass: rgba(255, 255, 255, 1); --dark: #1a1a1a; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; background: #000; }

        /* --- Landing Layer --- */
        #landing { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; background: #000; color: white; text-align: center; }
        #exterior-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; opacity: 0.8; }
        .btn-start { background: var(--bm-red); color: white; border: none; padding: 22px 70px; font-size: 1.4rem; border-radius: 60px; cursor: pointer; font-weight: 900; z-index: 20; position: relative; transition: all 0.3s; box-shadow: 0 0 20px rgba(192, 57, 43, 0.4); }
        .btn-start:hover { transform: scale(1.05); background: #e74c3c; }

        /* --- HD Navigation UI --- */
        #map-ui { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; }
        .overlay { position: absolute; background: var(--glass); padding: 22px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 60; border: 1px solid #eee; }
        .top-card { top: 25px; left: 25px; width: 340px; border-left: 8px solid var(--bm-red); }
        .location-hud { top: 25px; right: 25px; width: 280px; border-top: 5px solid #007bff; text-align: right; }
        #current-loc-display { font-size: 1.1rem; font-weight: 900; color: #1a1a1a; display: block; margin-top: 5px; text-transform: uppercase; }
        #dest-header { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); background: var(--dark); color: white; padding: 12px 30px; border-radius: 50px; font-weight: 800; display: none; z-index: 65; border: 1px solid #444; font-size: 0.9rem; letter-spacing: 1px; }
        #meters { font-size: 5rem; font-weight: 900; color: var(--bm-red); line-height: 1; letter-spacing: -4px; margin: 10px 0; }
        .unit { font-size: 0.8rem; color: #888; font-weight: 900; text-transform: uppercase; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; background: #ffffff; }
        select { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #eee; font-size: 1rem; font-weight: 700; background: #fff; color: #333; margin-top: 10px; cursor: pointer;}
        .connect-btn { background: #1a1a1a; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; margin-bottom: 20px; }
        #esp-indicator { position: absolute; top: 110px; right: 25px; background: #27ae60; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; display: none; align-items: center; gap: 8px; z-index: 100; font-size: 0.8rem; }
        .pulse { width: 8px; height: 8px; background: white; border-radius: 50%; animation: blink-anim 1s infinite; }
        @keyframes blink-anim { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
    </style>
</head>
<body onload="initExterior()">

    <div id="landing">
        <div id="exterior-bg"></div>
        <div style="z-index: 100; position: relative;">
            <h1 style="letter-spacing: 15px; font-size: 2.8rem; font-weight: 900; margin-bottom: 5px;">BRITISH MUSEUM</h1>
            <p style="letter-spacing: 4px; font-weight: 300; margin-bottom: 40px; color: #d25353;">DIGITAL WAYFINDING OF BRITISH MUSEUM </p>
            <button class="btn-start" onclick="enterMuseum()">ENTER MUSEUM</button>
        </div>
    </div>

    <div id="map-ui">
        <div id="dest-header">NAVIGATING TO: <span id="header-target" style="color:var(--bm-gold)">---</span></div>
        <div id="esp-indicator"><div class="pulse"></div> BEACON ACTIVE</div>
        
        <div class="overlay location-hud">
            <label style="font-size: 0.65rem; font-weight: 900; color: #999; text-transform: uppercase;">User Current Location</label>
            <span id="current-loc-display">Great Court</span>
        </div>

        <div class="overlay top-card">
            <button id="serial-btn" class="connect-btn" onclick="connectESP32()">🔌 PAIR TRACKING BEACON</button>
            <select id="destination" onchange="handleRoomSelect(this)">
                <optgroup label="Main Galleries">
                    <option value="">-- Choose Destination --</option>
                    <option value="4">Rosetta Stone (R4)</option>
                    <option value="18">Parthenon Sculptures (R18)</option>
                    <option value="62">Egyptian Mummies (R62)</option>
                    <option value="34">Islamic World (R34)</option>
                    <option value="cafe">Great Court Cafe</option>
                </optgroup>
                <optgroup label="Museum Archives">
                    <option value="prints">Prints & Drawings Archive</option>
                    <option value="coins">Coins & Medals Room</option>
                    <option value="anthro">Anthropological Archive</option>
                    <option value="horo">Horological Collection</option>
                </optgroup>
            </select>
            <div style="margin-top:25px;">
                <div id="meters">0</div>
                <div class="unit">Meters Remaining</div>
            </div>
        </div>
        <div id="canvas-container"></div>
    </div>

    <script>
        let extScene, extCamera, extRenderer; 
        let scene, camera, renderer, userMarker, pathLine;
        let galleryMeshes = {}, galleryLabels = {};
        let selectedRoomId = null;
        let isAutoSimulating = true;

        const rooms = {
            "4": { name: "Rosetta Stone", x: -140, z: -150, color: 0xc0392b },
            "18": { name: "Parthenon", x: 160, z: -120, color: 0x2980b9 },
            "62": { name: "Egyptian Mummies", x: 180, z: 160, color: 0x8e44ad },
            "34": { name: "Islamic World", x: -170, z: 80, color: 0xf39c12 },
            "cafe": { name: "Great Court Cafe", x: 0, z: 90, color: 0x7f8c8d },
            "prints": { name: "Prints Archive", x: -220, z: -50, color: 0x2c3e50 },
            "coins": { name: "Coins & Medals", x: 230, z: 40, color: 0xd4af37 },
            "anthro": { name: "Anthro Library", x: 100, z: -240, color: 0x27ae60 },
            "horo": { name: "Horology Center", x: -110, z: 230, color: 0x16a085 }
        };

        function initExterior() {
            extScene = new THREE.Scene();
            extCamera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            extRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            extRenderer.setPixelRatio(window.devicePixelRatio);
            extRenderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('exterior-bg').appendChild(extRenderer.domElement);
            extScene.add(new THREE.AmbientLight(0xffffff, 2.5));
            const mat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const base = new THREE.Mesh(new THREE.BoxGeometry(130, 5, 45), mat);
            extScene.add(base);
            for(let i=0; i<10; i++) {
                const col = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 50), mat);
                col.position.set(-58 + (i * 13), 25, 0);
                extScene.add(col);
            }
            let angle = 0;
            function animateLanding() {
                if(!extRenderer) return;
                requestAnimationFrame(animateLanding);
                angle += 0.005; 
                extCamera.position.x = 130 * Math.cos(angle);
                extCamera.position.z = 130 * Math.sin(angle);
                extCamera.position.y = 45; 
                extCamera.lookAt(0, 20, 0);
                extRenderer.render(extScene, extCamera);
            }
            animateLanding();
        }

        function enterMuseum() {
            gsap.to("#landing", { duration: 1, opacity: 0, onComplete: () => {
                document.getElementById('landing').style.display = 'none';
                document.getElementById('map-ui').style.display = 'block';
                extRenderer.dispose();
                extRenderer = null;
                setTimeout(initMap, 50);
            }});
        }

        function initMap() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 1, 4000);
            camera.position.set(0, 550, 550); camera.lookAt(0, 0, 0);
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(container.clientWidth, container.clientHeight);
            container.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
            scene.add(new THREE.GridHelper(1200, 60, 0xdddddd, 0xeeeeee));

            const dome = new THREE.Mesh(new THREE.CylinderGeometry(65, 65, 25, 64), new THREE.MeshStandardMaterial({ color: 0xfafafa }));
            dome.position.y = 12.5; scene.add(dome);

            Object.keys(rooms).forEach(id => {
                const r = rooms[id];
                const box = new THREE.Mesh(new THREE.BoxGeometry(55, 18, 55), new THREE.MeshStandardMaterial({ color: r.color }));
                box.position.set(r.x, 9, r.z); scene.add(box);
                galleryMeshes[id] = box;
                const label = createLabel(r.name, "#000");
                label.position.set(r.x, 85, r.z); scene.add(label);
                galleryLabels[id] = label;
            });

            userMarker = new THREE.Mesh(new THREE.SphereGeometry(15, 64, 64), new THREE.MeshBasicMaterial({ color: 0x007bff }));
            userMarker.position.set(0, 15, 0); scene.add(userMarker);
            pathLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xc0392b, linewidth: 3 }));
            scene.add(pathLine);
            animateMap();
            startMovementSimulation();
        }

        function startMovementSimulation() {
            const roomKeys = Object.keys(rooms);
            let targetIdx = 0;
            setInterval(() => {
                if(!isAutoSimulating) return;
                const targetRoom = rooms[roomKeys[targetIdx]];
                gsap.to(userMarker.position, {
                    x: targetRoom.x,
                    z: targetRoom.z,
                    duration: 5,
                    ease: "sine.inOut",
                    onUpdate: () => updateProximity()
                });
                targetIdx = (targetIdx + 1) % roomKeys.length;
            }, 7000);
        }

        function updateProximity() {
            let closestRoom = "Great Court";
            let minDist = 90; 
            Object.keys(rooms).forEach(id => {
                const d = userMarker.position.distanceTo(new THREE.Vector3(rooms[id].x, 15, rooms[id].z));
                if (d < minDist) { minDist = d; closestRoom = rooms[id].name; }
            });
            document.getElementById('current-loc-display').innerText = closestRoom;
        }

        function handleRoomSelect(select) {
            // Reset color of previous selection to its original solid color
            if (selectedRoomId) {
                galleryMeshes[selectedRoomId].material.color.set(rooms[selectedRoomId].color);
            }

            selectedRoomId = select.value;
            const header = document.getElementById('dest-header');
            if(selectedRoomId) {
                header.style.display = 'block';
                document.getElementById('header-target').innerText = rooms[selectedRoomId].name.toUpperCase();
            } else {
                header.style.display = 'none';
            }
            updateLabelStatus();
        }

        function createLabel(text, color) {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            canvas.width = 1024; canvas.height = 256;
            ctx.fillStyle = 'rgba(255,255,255,0.98)'; ctx.roundRect(112, 50, 800, 156, 40); ctx.fill();
            ctx.font = 'Bold 72px Segoe UI'; ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.fillText(text, 512, 145);
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = 16;
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.scale.set(110, 28, 1); return sprite;
        }

        async function connectESP32() {
            if (!("serial" in navigator)) { alert("Web Serial not supported in this browser."); return; }
            try {
                const port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                isAutoSimulating = false; 
                document.getElementById('esp-indicator').style.display = 'flex';
                document.getElementById('serial-btn').style.display = 'none';
                const textDecoder = new TextDecoderStream();
                port.readable.pipeTo(textDecoder.writable);
                const reader = textDecoder.readable.getReader();
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    if (value) {
                        const lines = value.split('\n');
                        lines.forEach(line => {
                            const coords = line.trim().split(',');
                            if (coords.length >= 2) {
                                userMarker.position.x = parseFloat(coords[0]);
                                userMarker.position.z = parseFloat(coords[1]);
                                updateProximity();
                            }
                        });
                    }
                }
            } catch (err) { console.warn(err); }
        }

        function animateMap() {
            requestAnimationFrame(animateMap);
            
            if (selectedRoomId) {
                userMarker.visible = false; 
                const target = rooms[selectedRoomId];
                const d = userMarker.position.distanceTo(new THREE.Vector3(target.x, userMarker.position.y, target.z));
                document.getElementById('meters').innerText = Math.round(d);
                pathLine.geometry.setFromPoints([new THREE.Vector3(userMarker.position.x, 8, userMarker.position.z), new THREE.Vector3(target.x, 8, target.z)]);

                // DESTINATION BLINKING EFFECT
                const blink = (Math.sin(Date.now() * 0.008) + 1) / 2;
                galleryMeshes[selectedRoomId].material.color.lerpColors(
                    new THREE.Color(rooms[selectedRoomId].color),
                    new THREE.Color(0xffffff),
                    blink * 0.7 // Oscillates intensity
                );

            } else {
                userMarker.visible = true; 
                pathLine.geometry.setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)]);
                document.getElementById('meters').innerText = "0";
            }
            renderer.render(scene, camera);
        }

        function updateLabelStatus() {
            Object.keys(galleryLabels).forEach(id => {
                scene.remove(galleryLabels[id]);
                const active = id === selectedRoomId;
                galleryLabels[id] = createLabel(active ? "📍 GO TO: " + rooms[id].name : rooms[id].name, active ? "#c0392b" : "#000");
                galleryLabels[id].position.set(rooms[id].x, 85, rooms[id].z);
                scene.add(galleryLabels[id]);
            });
        }
    </script>
</body>
</html>
